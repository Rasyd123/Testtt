<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayVault – Personal Payment Repository</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0F172A;
            --card-slate: rgba(30, 41, 59, 0.6);
            --accent-sky: #38BDF8;
            --accent-emerald: #22C55E;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: #F8FAFC;
            overflow-x: hidden;
        }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }
        .glass-card {
            background: var(--card-slate);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            border-color: var(--accent-sky);
        }
        .modal-enter {
            animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes pop {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .toast-active { transform: translate(-50%, -24px); opacity: 1; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-sky); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-40 w-full glass-card border-none rounded-none border-b border-white/10 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="p-2 bg-sky-500 rounded-lg">
                    <i data-lucide="shield-check" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-white to-sky-400 bg-clip-text text-transparent uppercase">PayVault</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden md:flex items-center gap-2 bg-slate-900/50 px-3 py-1.5 rounded-full border border-white/5">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-xs font-medium text-slate-400">System Secure</span>
                </div>
                <button class="p-2 hover:bg-white/10 rounded-full transition-colors"><i data-lucide="user" class="w-5 h-5 text-slate-300"></i></button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <header class="mb-12 space-y-6">
            <div class="max-w-2xl">
                <h1 class="text-4xl md:text-5xl font-extrabold mb-4">Payment Repository</h1>
                <p class="text-slate-400 text-lg">Manage and share your bank accounts, e-wallets, and QRIS credentials securely in one dashboard.</p>
            </div>
            
            <div class="relative max-w-lg">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 w-5 h-5"></i>
                <input type="text" id="searchInput" placeholder="Search provider or account name..." 
                       class="w-full bg-slate-800/40 border border-white/10 rounded-2xl py-4 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-sky-500/50 transition-all text-white placeholder:text-slate-500">
            </div>
        </header>

        <div id="accountsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

        <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-slate-500">
            <i data-lucide="search-x" class="w-16 h-16 mb-4 opacity-20"></i>
            <p class="text-xl font-medium">No accounts found</p>
            <p class="text-sm">Try adjusting your search criteria</p>
        </div>
    </main>

    <div id="qrisModal" class="fixed inset-0 z-50 flex items-center justify-center hidden p-6">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="relative bg-white rounded-[32px] p-8 max-w-sm w-full shadow-2xl modal-enter">
            <button onclick="closeModal()" class="absolute -top-4 -right-4 bg-slate-900 text-white p-2 rounded-full hover:bg-red-500 transition-colors shadow-lg">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div class="text-center">
                <h3 id="modalTitle" class="text-slate-900 text-xl font-bold mb-1">QRIS Payment</h3>
                <p id="modalSubtitle" class="text-slate-500 text-sm mb-6">Scan to pay securely</p>
                <div class="bg-white p-4 rounded-2xl border-2 border-slate-100 aspect-square flex items-center justify-center mb-6">
                    <img id="qrisImage" src="" alt="QRIS Code" class="w-full h-full object-contain">
                </div>
                <div class="bg-slate-50 rounded-xl p-3 flex items-center justify-center gap-2 border border-slate-100">
                    <i data-lucide="info" class="w-4 h-4 text-sky-600"></i>
                    <span class="text-xs text-slate-600 font-medium tracking-wide">Supported by GPN & All E-Wallets</span>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-0 left-1/2 -translate-x-1/2 bg-emerald-500 text-white px-6 py-3 rounded-full shadow-lg font-medium text-sm flex items-center gap-2 opacity-0 transition-all duration-300 pointer-events-none z-50">
        <i data-lucide="check-circle" class="w-4 h-4"></i>
        <span>Copied to clipboard!</span>
    </div>

    <script>
        const accountsData = [
            { id: 1, provider: 'Bank BCA', accountName: 'ALEXANDER SMITH', accountNumber: '8820491823', type: 'Bank', color: 'blue' },
            { id: 2, provider: 'Mandiri', accountName: 'ALEXANDER SMITH', accountNumber: '1240012938481', type: 'Bank', color: 'yellow' },
            { id: 3, provider: 'GoPay', accountName: 'Alex Smith', accountNumber: '081234567890', type: 'E-Wallet', color: 'emerald' },
            { id: 4, provider: 'OVO', accountName: 'Alex Smith', accountNumber: '081234567890', type: 'E-Wallet', color: 'purple' },
            { id: 5, provider: 'Dana', accountName: 'Alex Smith', accountNumber: '081234567890', type: 'E-Wallet', color: 'sky' },
            { id: 6, provider: 'Global QRIS', accountName: 'VAULT-MERCHANT', accountNumber: '7294021', type: 'QRIS', color: 'rose' }
        ];

        const accountsGrid = document.getElementById('accountsGrid');
        const searchInput = document.getElementById('searchInput');
        const emptyState = document.getElementById('emptyState');
        const qrisModal = document.getElementById('qrisModal');
        const toast = document.getElementById('toast');

        function renderAccounts(data) {
            accountsGrid.innerHTML = '';
            if (data.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }
            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');

            data.forEach((acc, index) => {
                const card = document.createElement('div');
                card.className = `glass-card p-6 rounded-[24px] fade-in-up`;
                card.style.animationDelay = `${index * 100}ms`;
                
                const isQRIS = acc.type === 'QRIS';
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-sky-500 mb-1">${acc.type}</span>
                            <h3 class="text-xl font-bold">${acc.provider}</h3>
                        </div>
                        <div class="p-3 bg-white/5 rounded-xl border border-white/10">
                            <i data-lucide="${isQRIS ? 'qr-code' : 'wallet'}" class="w-6 h-6 text-slate-300"></i>
                        </div>
                    </div>
                    <div class="space-y-1 mb-8">
                        <p class="text-slate-400 text-xs font-medium uppercase tracking-wider">Account Holder</p>
                        <p class="text-lg font-semibold truncate">${acc.accountName}</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="copyToClipboard('${acc.accountNumber}')" 
                                class="flex-1 flex items-center justify-center gap-2 bg-slate-700/50 hover:bg-sky-600 transition-all py-3 rounded-xl font-semibold text-sm border border-white/5 group">
                            <i data-lucide="copy" class="w-4 h-4 group-hover:scale-110 transition-transform"></i>
                            Copy
                        </button>
                        ${isQRIS ? `
                            <button onclick="showQR('${acc.provider}', '${acc.accountName}')"
                                    class="flex-1 flex items-center justify-center gap-2 bg-sky-500 hover:bg-sky-400 transition-all py-3 rounded-xl font-semibold text-sm shadow-lg shadow-sky-500/20">
                                <i data-lucide="maximize" class="w-4 h-4"></i>
                                QR Code
                            </button>
                        ` : ''}
                    </div>
                `;
                accountsGrid.appendChild(card);
            });
            lucide.createIcons();
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast();
            });
        }

        function showToast() {
            toast.classList.add('toast-active');
            setTimeout(() => {
                toast.classList.remove('toast-active');
            }, 2000);
        }

        function showQR(provider, name) {
            document.getElementById('modalTitle').innerText = provider;
            document.getElementById('modalSubtitle').innerText = name;
            // Simulated QR Generator using QRServer API
            document.getElementById('qrisImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=PayVault-${provider}-${name}&bgcolor=ffffff`;
            qrisModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }

        function closeModal() {
            qrisModal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = accountsData.filter(acc => 
                acc.provider.toLowerCase().includes(term) || 
                acc.accountName.toLowerCase().includes(term) ||
                acc.type.toLowerCase().includes(term)
            );
            renderAccounts(filtered);
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderAccounts(accountsData);
            lucide.createIcons();
        });
    </script>
</body>
</html>
