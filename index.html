<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayHub – Digital Vault Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0F172A;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38BDF8;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: #F8FAFC;
            overflow-x: hidden;
        }
        .heading-font { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .card-shadow:hover {
            box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.3);
        }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .modal-enter {
            animation: modalScale 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalScale {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .payment-card {
            aspect-ratio: 1.586/1;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .payment-card:hover {
            transform: translateY(-10px) rotate(1deg);
        }
        .list-item { transition: all 0.2s ease; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0F172A; }
        ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="fixed top-0 w-full z-50 glass border-b border-white/5 px-6 py-4 animate-[slideDown_0.5s_ease-out]">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center">
                    <i data-lucide="wallet" class="text-white"></i>
                </div>
                <span class="heading-font text-2xl font-extrabold tracking-tight text-white">PayHub</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative hidden md:block">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    <input type="text" id="searchInput" placeholder="Search provider..." 
                        class="bg-slate-800/50 border border-slate-700 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-sky-500 w-64 transition-all">
                </div>
                <button onclick="toggleView()" class="p-2 hover:bg-slate-800 rounded-lg transition-colors" title="Toggle View">
                    <i data-lucide="layout-grid" id="viewIcon"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-28 px-6 max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="heading-font text-4xl font-extrabold text-white mb-2">Dashboard Vault</h1>
                <p class="text-slate-400">Manage and access your payment details securely.</p>
            </div>
            <div class="flex gap-3">
                <button onclick="openModal('addModal')" class="bg-sky-500 hover:bg-sky-400 text-white px-6 py-3 rounded-xl font-semibold flex items-center gap-2 transition-all active:scale-95">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    Add Payment
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-10">
            <div class="glass p-6 rounded-2xl border-l-4 border-emerald-500">
                <p class="text-slate-400 text-sm mb-1 uppercase tracking-wider font-semibold">Active E-Wallets</p>
                <h2 id="eWalletCount" class="heading-font text-3xl font-bold text-white">0</h2>
            </div>
            <div class="glass p-6 rounded-2xl border-l-4 border-sky-500">
                <p class="text-slate-400 text-sm mb-1 uppercase tracking-wider font-semibold">Bank Accounts</p>
                <h2 id="bankCount" class="heading-font text-3xl font-bold text-white">0</h2>
            </div>
            <div class="glass p-6 rounded-2xl border-l-4 border-amber-500">
                <p class="text-slate-400 text-sm mb-1 uppercase tracking-wider font-semibold">QRIS Codes</p>
                <h2 id="qrisCount" class="heading-font text-3xl font-bold text-white">0</h2>
            </div>
        </div>

        <div id="vaultContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="glass payment-card rounded-[2rem] p-8 shimmer"></div>
            <div class="glass payment-card rounded-[2rem] p-8 shimmer"></div>
            <div class="glass payment-card rounded-[2rem] p-8 shimmer"></div>
        </div>
    </main>

    <div id="qrisModal" class="fixed inset-0 z-[60] hidden bg-slate-950/90 backdrop-blur-md items-center justify-center p-6" onclick="closeModal('qrisModal')">
        <div class="modal-enter glass p-4 rounded-[2.5rem] max-w-sm w-full" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="heading-font text-xl font-bold">QRIS Preview</h3>
                <button onclick="closeModal('qrisModal')" class="p-2 hover:bg-slate-800 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div class="aspect-square bg-white rounded-3xl p-4 flex items-center justify-center">
                <img id="qrisFullImg" src="" alt="QRIS" class="w-full h-full object-contain">
            </div>
            <div class="mt-6 text-center">
                <p id="qrisName" class="font-bold text-lg text-white"></p>
                <p class="text-slate-400 text-sm">Scan this code to pay</p>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] translate-y-20 opacity-0 transition-all duration-300">
        <div class="bg-emerald-500 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3">
            <i data-lucide="check-circle-2" class="w-5 h-5"></i>
            <span class="font-medium">Copied to clipboard!</span>
        </div>
    </div>

    <script>
        // INITIAL STATE
        let paymentVault = JSON.parse(localStorage.getItem('payhub_vault')) || [
            { id: 1, type: 'bank', provider: 'Bank BCA', accountName: 'John Doe', accountNumber: '8820399102', color: 'bg-blue-600' },
            { id: 2, type: 'ewallet', provider: 'GoPay', accountName: 'John Doe', accountNumber: '08123456789', color: 'bg-emerald-500' },
            { id: 3, type: 'qris', provider: 'Merchant QRIS', accountName: 'PayHub Store', accountNumber: 'QRIS_MAIN', qrisUrl: 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=PayHub_Sample', color: 'bg-slate-700' }
        ];

        let currentView = 'grid';

        // CORE FUNCTIONS
        const renderCards = (data = paymentVault) => {
            const container = document.getElementById('vaultContainer');
            container.innerHTML = '';

            data.forEach(item => {
                const card = document.createElement('div');
                
                if (currentView === 'grid') {
                    card.className = 'glass payment-card rounded-[2rem] p-8 card-shadow flex flex-col justify-between group cursor-default relative overflow-hidden';
                    card.innerHTML = `
                        <div class="absolute top-0 right-0 p-6">
                            <div class="w-12 h-12 ${item.color} rounded-2xl flex items-center justify-center text-white shadow-lg">
                                <i data-lucide="${item.type === 'bank' ? 'building-2' : (item.type === 'qris' ? 'qr-code' : 'smartphone')}"></i>
                            </div>
                        </div>
                        <div>
                            <span class="text-xs font-bold uppercase tracking-widest text-slate-400 opacity-60">${item.type}</span>
                            <h3 class="heading-font text-2xl font-bold mt-2 text-white">${item.provider}</h3>
                        </div>
                        <div class="space-y-4">
                            ${item.type === 'qris' ? `
                                <button onclick="viewQRIS('${item.qrisUrl}', '${item.provider}')" class="w-full bg-white/10 hover:bg-white/20 py-3 rounded-xl flex items-center justify-center gap-2 transition-all">
                                    <i data-lucide="maximize" class="w-4 h-4"></i> View QR Code
                                </button>
                            ` : `
                                <div>
                                    <p class="text-xs text-slate-400 mb-1">ACCOUNT HOLDER</p>
                                    <p class="font-medium text-slate-200 uppercase">${item.accountName}</p>
                                </div>
                                <div class="flex items-center justify-between bg-slate-800/50 p-3 rounded-xl border border-slate-700/50">
                                    <span class="font-mono text-sky-400 font-bold">${item.accountNumber}</span>
                                    <button onclick="copyToClipboard('${item.accountNumber}', this)" class="text-slate-400 hover:text-white transition-all transform hover:scale-110">
                                        <i data-lucide="copy" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            `}
                        </div>
                    `;
                } else {
                    // List View
                    card.className = 'glass list-item p-4 rounded-xl flex items-center justify-between gap-4 border border-white/5 hover:border-sky-500/30';
                    card.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 ${item.color} rounded-lg flex items-center justify-center text-white">
                                <i data-lucide="${item.type === 'bank' ? 'building-2' : (item.type === 'qris' ? 'qr-code' : 'smartphone')}" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-white">${item.provider}</h4>
                                <p class="text-xs text-slate-400">${item.accountName}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-mono text-sm text-sky-400">${item.accountNumber}</span>
                            <button onclick="copyToClipboard('${item.accountNumber}', this)" class="p-2 hover:bg-slate-700 rounded-lg text-slate-400 hover:text-white transition-all">
                                <i data-lucide="copy" class="w-4 h-4"></i>
                            </button>
                        </div>
                    `;
                }
                container.appendChild(card);
            });
            
            updateStats();
            lucide.createIcons();
        };

        const updateStats = () => {
            document.getElementById('eWalletCount').textContent = paymentVault.filter(i => i.type === 'ewallet').length;
            document.getElementById('bankCount').textContent = paymentVault.filter(i => i.type === 'bank').length;
            document.getElementById('qrisCount').textContent = paymentVault.filter(i => i.type === 'qris').length;
        };

        const toggleView = () => {
            currentView = currentView === 'grid' ? 'list' : 'grid';
            const container = document.getElementById('vaultContainer');
            const icon = document.getElementById('viewIcon');
            
            if (currentView === 'list') {
                container.classList.remove('grid-cols-1', 'md:grid-cols-2', 'lg:grid-cols-3');
                container.classList.add('flex', 'flex-col', 'gap-4');
                icon.setAttribute('data-lucide', 'list');
            } else {
                container.classList.remove('flex', 'flex-col', 'gap-4');
                container.classList.add('grid', 'grid-cols-1', 'md:grid-cols-2', 'lg:grid-cols-3');
                icon.setAttribute('data-lucide', 'layout-grid');
            }
            renderCards();
        };

        const copyToClipboard = async (text, btn) => {
            try {
                await navigator.clipboard.writeText(text);
                const originalIcon = btn.innerHTML;
                btn.innerHTML = '<i data-lucide="check" class="text-emerald-500"></i>';
                lucide.createIcons();
                
                showToast();
                
                setTimeout(() => {
                    btn.innerHTML = originalIcon;
                    lucide.createIcons();
                }, 2000);
            } catch (err) {
                console.error('Failed to copy!', err);
            }
        };

        const showToast = () => {
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 2500);
        };

        const viewQRIS = (url, name) => {
            document.getElementById('qrisFullImg').src = url;
            document.getElementById('qrisName').textContent = name;
            document.getElementById('qrisModal').classList.remove('hidden');
            document.getElementById('qrisModal').classList.add('flex');
        };

        const closeModal = (id) => {
            document.getElementById(id).classList.add('hidden');
            document.getElementById(id).classList.remove('flex');
        };

        // SEARCH LOGIC
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = paymentVault.filter(item => 
                item.provider.toLowerCase().includes(term) || 
                item.accountName.toLowerCase().includes(term) ||
                item.accountNumber.includes(term)
            );
            renderCards(filtered);
        });

        // INIT
        window.onload = () => {
            setTimeout(renderCards, 800); // Simulate network load for shimmer effect
            lucide.createIcons();
        };
    </script>
</body>
</html>
